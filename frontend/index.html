<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BFHL Hierarchy Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Sora:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
  --bg: #f6f8fb;
  --surface: #ffffff;
  --surface2: #f1f4f9;
  --border: #e3e8f0;
  --border2: #d5dce6;
  --text: #1f2937;
  --muted: #6b7280;
  --accent: #4f7ef8;
  --accent2: #6c3fe8;
  --green: #16a34a;
  --red: #dc2626;
  --amber: #d97706;
  --purple: #7c3aed;
  --teal: #0d9488;
  --font: 'Sora', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    header {
      padding: 2rem 2rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
    }

    .header-inner {
      max-width: 900px;
      margin: auto;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    

    .header-text h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .header-text p {
      font-size: 0.8rem;
      color: var(--muted);
      font-family: var(--mono);
    }

    main {
      max-width: 900px;
      margin: auto;
      padding: 2rem;
    }

    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .input-label {
      font-size: 0.78rem;
      font-family: var(--mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.75rem;
    }

    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.85rem;
      padding: 0.9rem 1rem;
      resize: vertical;
      min-height: 90px;
      line-height: 1.7;
      transition: border-color 0.2s;
      outline: none;
    }

    textarea:focus { border-color: var(--accent); }

    .input-hint {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.5rem;
    }

    .btn-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 1rem;
    }

    button {
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.6rem 1.5rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: all 0.18s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
    }

    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border2);
    }

    .btn-secondary:hover { color: var(--text); border-color: var(--border2); background: var(--border); }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      display: inline-block;
      margin-right: 0.4rem;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .error-box {
      background: rgba(248, 113, 113, 0.08);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: 10px;
      padding: 1rem 1.2rem;
      color: var(--red);
      font-size: 0.88rem;
      margin-bottom: 1.5rem;
      display: none;
    }

    .section-title {
      font-size: 0.72rem;
      font-family: var(--mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Summary Cards */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      text-align: center;
    }

    .stat-label {
      font-size: 0.72rem;
      font-family: var(--mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.3rem;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: -0.04em;
    }

    .stat-value.trees { color: var(--green); }
    .stat-value.cycles { color: var(--red); }
    .stat-value.root { font-size: 1.4rem; color: var(--accent); }

    /* Hierarchy Cards */
    .hierarchies-grid {
      display: grid;
      gap: 14px;
      margin-bottom: 2rem;
    }

    .hierarchy-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .hierarchy-card:hover { border-color: var(--border2); }

    .hierarchy-card.is-cycle {
      border-color: rgba(248, 113, 113, 0.25);
    }

    .hierarchy-card.is-cycle:hover {
      border-color: rgba(248, 113, 113, 0.45);
    }

    .hcard-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.2rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .hcard-root {
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .root-badge {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-weight: 600;
      font-size: 0.95rem;
    }

    .root-badge.cycle-badge {
      background: linear-gradient(135deg, var(--red), #c0392b);
    }

    .root-info h3 {
      font-size: 0.9rem;
      font-weight: 600;
    }

    .root-info p {
      font-size: 0.72rem;
      color: var(--muted);
      font-family: var(--mono);
    }

    .hcard-tags {
      display: flex;
      gap: 0.5rem;
    }

    .tag {
      font-size: 0.7rem;
      font-family: var(--mono);
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      font-weight: 600;
    }

    .tag-depth { background: rgba(79, 126, 248, 0.12); color: var(--accent); }
    .tag-cycle { background: rgba(248, 113, 113, 0.12); color: var(--red); }

    .hcard-body {
      padding: 1rem 1.2rem;
    }

    .tree-view {
      font-family: var(--mono);
      font-size: 0.82rem;
      line-height: 1.9;
      color: var(--muted);
    }

    .tree-view .node-line {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .tree-view .node-name {
      color: var(--text);
      font-weight: 600;
    }

    .tree-view .connector {
      color: var(--border2);
    }

    .tree-view .leaf {
      color: var(--teal);
    }

    .cycle-msg {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: var(--red);
      font-size: 0.83rem;
      font-family: var(--mono);
    }

    .cycle-icon {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: rgba(248, 113, 113, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
    }

    /* Entries Row */
    .entries-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 2rem;
    }

    .entries-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.2rem;
    }

    .entries-card-title {
      font-size: 0.75rem;
      font-family: var(--mono);
      font-weight: 600;
      margin-bottom: 0.7rem;
    }

    .entries-card-title.invalid { color: var(--red); }
    .entries-card-title.dupe { color: var(--amber); }

    .pill-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pill {
      font-family: var(--mono);
      font-size: 0.75rem;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
    }

    .pill-invalid { background: rgba(248, 113, 113, 0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
    .pill-dupe { background: rgba(251, 191, 36, 0.1); color: var(--amber); border: 1px solid rgba(251,191,36,0.2); }
    .pill-none { color: var(--muted); font-size: 0.78rem; font-family: var(--mono); }

    #results { display: none; }

    .loading-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1.5rem 0;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .summary-grid { grid-template-columns: 1fr 1fr; }
      .entries-row { grid-template-columns: 1fr; }
      .summary-grid .stat-card:last-child { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
   
    <div class="header-text">
      <h1>Hierarchy Explorer</h1>
      <p>Node relationship analyser</p>
    </div>
  </div>
</header>

<main>
  <div class="input-card">
    <div class="input-label">Node list input</div>
    <textarea id="inputData" placeholder="A->B, A->C, B->D, X->Y, Y->Z, Z->X, hello, 1->2">A->B, A->C, B->D, C->E, E->F, X->Y, Y->Z, Z->X, P->Q, Q->R, G->H, G->H, G->I, hello, 1->2, A-></textarea>
    <div class="input-hint">Separate entries with commas or newlines &nbsp;·&nbsp; e.g. <code style="font-family: var(--mono); font-size: 0.75rem; color: var(--accent);">A->B, B->C</code></div>
    <div class="btn-row">
      <button class="btn-primary" onclick="submitData()" id="submitBtn">Analyse</button>
      <button class="btn-secondary" onclick="clearAll()">Clear</button>
    </div>
  </div>

  <div class="error-box" id="errorBox"></div>
  <div class="loading-row" id="loadingRow" style="display:none">
    <div class="spinner"></div>
    <span>Calling API…</span>
  </div>

  <div id="results">
    <!-- Summary -->
    <div class="section-title">Summary</div>
    <div class="summary-grid" id="summaryGrid"></div>

    <!-- Hierarchies -->
    <div class="section-title">Hierarchies</div>
    <div class="hierarchies-grid" id="hierarchiesGrid"></div>

    <!-- Invalid + Duplicates -->
    <div class="section-title">Entries</div>
    <div class="entries-row" id="entriesRow"></div>
  </div>
</main>

<script>
  function buildTreeLines(obj, prefix, isLast, lines) {
    const keys = Object.keys(obj);
    keys.forEach((key, i) => {
      const last = i === keys.length - 1;
      const connector = last ? '└─' : '├─';
      const hasChildren = Object.keys(obj[key]).length > 0;
      lines.push({ prefix, connector, key, isLeaf: !hasChildren });
      buildTreeLines(obj[key], prefix + (last ? '   ' : '│  '), last, lines);
    });
  }

  function renderTree(treeObj) {
    if (!treeObj || Object.keys(treeObj).length === 0) return '';
    const rootKey = Object.keys(treeObj)[0];
    const lines = [];
    lines.push({ prefix: '', connector: '', key: rootKey, isLeaf: false, isRoot: true });
    buildTreeLines(treeObj[rootKey], '', false, lines);
    return lines.map(l => {
      if (l.isRoot) return `<div class="node-line"><span class="node-name">${l.key}</span></div>`;
      const cls = l.isLeaf ? 'leaf' : 'node-name';
      return `<div class="node-line"><span class="connector">${l.prefix}${l.connector}</span><span class="${cls}">${l.key}</span></div>`;
    }).join('');
  }

  async function submitData() {
    const input = document.getElementById('inputData').value;
    const errorBox = document.getElementById('errorBox');
    const resultsDiv = document.getElementById('results');
    const loadingRow = document.getElementById('loadingRow');
    const submitBtn = document.getElementById('submitBtn');

    errorBox.style.display = 'none';
    resultsDiv.style.display = 'none';
    loadingRow.style.display = 'flex';
    submitBtn.disabled = true;

    const dataArray = input.split(/,|\n/).map(s => s.trim()).filter(s => s.length > 0);

    try {
      const response = await fetch('https://bajaj-finserv-assignment-oyww.onrender.com/bfhl', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data: dataArray })
      });

      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      renderResults(data);
    } catch (err) {
      errorBox.textContent = 'API call failed: ' + err.message;
      errorBox.style.display = 'block';
    } finally {
      loadingRow.style.display = 'none';
      submitBtn.disabled = false;
    }
  }

  function renderResults(data) {
    const { summary, hierarchies, invalid_entries, duplicate_edges } = data;

    // Summary
    document.getElementById('summaryGrid').innerHTML = `
      <div class="stat-card">
        <div class="stat-label">Valid Trees</div>
        <div class="stat-value trees">${summary.total_trees}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Cycles</div>
        <div class="stat-value cycles">${summary.total_cycles}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Largest Tree Root</div>
        <div class="stat-value root">${summary.largest_tree_root || '—'}</div>
      </div>
    `;

    // Hierarchies
    document.getElementById('hierarchiesGrid').innerHTML = hierarchies.map(h => {
      const isCycle = h.has_cycle === true;
      const bodyHTML = isCycle
        ? `<div class="cycle-msg"><div class="cycle-icon">↻</div>Cycle detected — no tree structure</div>`
        : `<div class="tree-view">${renderTree(h.tree)}</div>`;

      return `
        <div class="hierarchy-card ${isCycle ? 'is-cycle' : ''}">
          <div class="hcard-header">
            <div class="hcard-root">
              <div class="root-badge ${isCycle ? 'cycle-badge' : ''}">${h.root}</div>
              <div class="root-info">
                <h3>Root: ${h.root}</h3>
                <p>${isCycle ? 'cyclic group' : 'tree structure'}</p>
              </div>
            </div>
            <div class="hcard-tags">
              ${isCycle ? '<span class="tag tag-cycle">cycle</span>' : `<span class="tag tag-depth">depth ${h.depth}</span>`}
            </div>
          </div>
          <div class="hcard-body">${bodyHTML}</div>
        </div>
      `;
    }).join('');

    // Invalid + Duplicates
    const invalidPills = invalid_entries.length
      ? invalid_entries.map(e => `<span class="pill pill-invalid">${e}</span>`).join('')
      : '<span class="pill-none">none</span>';

    const dupePills = duplicate_edges.length
      ? duplicate_edges.map(e => `<span class="pill pill-dupe">${e}</span>`).join('')
      : '<span class="pill-none">none</span>';

    document.getElementById('entriesRow').innerHTML = `
      <div class="entries-card">
        <div class="entries-card-title invalid">Invalid entries (${invalid_entries.length})</div>
        <div class="pill-list">${invalidPills}</div>
      </div>
      <div class="entries-card">
        <div class="entries-card-title dupe">Duplicate edges (${duplicate_edges.length})</div>
        <div class="pill-list">${dupePills}</div>
      </div>
    `;

    document.getElementById('results').style.display = 'block';
  }

  function clearAll() {
    document.getElementById('inputData').value = '';
    document.getElementById('results').style.display = 'none';
    document.getElementById('errorBox').style.display = 'none';
  }
</script>

</body>
</html>
